<article class="card" data-title="{{ r.title|lower }}">
    <a href="/recipe/{{ r.id }}" class="card__cover">
        {% if r.image_path %}
            <img src="{{ r.image_path }}" alt="{{ r.title }}">
        {% else %}
            <div class="card__placeholder"></div>
        {% endif %}
        <button class="card__fav {% if r.id in fav_ids %}is-on{% endif %}"
                data-recipe-id="{{ r.id }}"
                aria-label="В избранное"
                {% if not user %}data-needs-auth="1"{% endif %}>♥</button>
    </a>
    <div class="card__body">
        <h3 class="card__title"><a href="/recipe/{{ r.id }}">{{ r.title }}</a></h3>
        <p class="card__author">{{ r.author.name }}</p>
    </div>
</article>
