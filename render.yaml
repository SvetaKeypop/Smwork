# Render Blueprint — даёт Render'у инструкцию, как развернуть проект.
# В Render UI: New → Blueprint → выбрать репозиторий → Apply.
databases:
  - name: culinary-blog-db
    plan: free
    databaseName: culinary_blog
    user: blog

services:
  - type: web
    name: culinary-blog
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: culinary-blog-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        value: change-me-after-first-login
